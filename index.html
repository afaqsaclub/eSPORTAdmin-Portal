<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مركز القيادة | فريق آفاق</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #09090b; --bg-card: #18181b; --bg-card-hover: #27272a;
            --green-light: #00aa61; --green-dark: #006c5c;
            --gradient: linear-gradient(135deg, var(--green-light), var(--green-dark));
            --text-main: #f4f4f5; --text-muted: #a1a1aa;
            --border: #27272a; --danger: #ef4444; --warning: #f59e0b;
            --sidebar-width: 280px; --glass-bg: rgba(24, 24, 27, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }

        /* ================= شاشة الدخول ================= */
        #loginScreen { position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle at top left, var(--green-dark) 0%, var(--bg-main) 60%); display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 40px 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box img { width: 90px; margin-bottom: 15px; }
        .login-tabs { display: flex; margin-bottom: 30px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 5px; }
        .login-tab { flex: 1; padding: 10px; cursor: pointer; color: var(--text-muted); font-weight: 700; border-radius: 8px; transition: 0.3s; font-size: 0.95rem; }
        .login-tab.active { background: var(--bg-card); color: var(--green-light); }
        .login-form { display: none; flex-direction: column; gap: 15px; }
        .login-form.active { display: flex; animation: fadeInUp 0.4s ease; }
        .login-input { background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: white; padding: 16px; border-radius: 12px; text-align: center; font-size: 1rem; transition: 0.3s; outline: none; }
        .login-btn { background: var(--gradient); border: none; color: white; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; gap: 10px; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,170,97,0.3); }

        /* ================= التخطيط الأساسي ================= */
        #dashboardWrapper { display: none; min-height: 100vh; flex-direction: column; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; }
        .sidebar { width: var(--sidebar-width); background: var(--bg-card); border-left: 1px solid var(--border); position: fixed; top: 0; right: 0; height: 100vh; display: flex; flex-direction: column; z-index: 100; transition: transform 0.4s; }
        .brand { padding: 30px 25px; border-bottom: 1px solid var(--border); }
        .nav-menu { padding: 15px; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 14px; color: var(--text-muted); text-decoration: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .nav-item.active { background: var(--gradient); color: white; }
        .logout-btn { width: 90%; margin: 20px auto; background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        
        .main-content { margin-right: var(--sidebar-width); padding: 30px 40px; flex: 1; }
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; background: var(--glass-bg); padding: 20px 25px; border-radius: 16px; border: 1px solid var(--border); }
        
        .page-section { display: none; }
        .page-section.active { display: block; }
        
        /* البطاقات والجدول */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-bottom: 35px; }
        .action-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 15px; text-decoration: none; color: white; }
        .icon-box { width: 50px; height: 50px; border-radius: 14px; background: var(--green-light); display: flex; align-items: center; justify-content: center; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 35px; }
        .stat-card { background: var(--gradient); border-radius: 20px; padding: 30px; text-align: center; }
        .stat-num { font-size: 3rem; font-weight: 900; }
        
        .table-responsive { width: 100%; overflow-x: auto; background: var(--bg-card); border-radius: 12px; padding: 20px; }
        .styled-table { width: 100%; border-collapse: collapse; text-align: right; }
        .styled-table th, .styled-table td { padding: 15px; border-bottom: 1px solid var(--border); }
        
        .task-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .btn-delete { margin-top: 10px; background: var(--danger); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-right: 0; padding-top: 100px; }
            .top-header { position: fixed; top: 10px; right: 10px; left: 10px; }
        }
    </style>
</head>
<body>

    <!-- الدخول -->
    <div id="loginScreen">
        <div class="login-box">
            <img src="https://i.ibb.co/TMVG5JMr/white-logo.png" alt="Logo">
            <h2>مركز القيادة</h2>
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchLoginTab('manager')">المدير العام</div>
                <div class="login-tab" onclick="switchLoginTab('admin')">الكادر الإداري</div>
            </div>
            <div id="login-manager" class="login-form active">
                <input type="password" id="managerPass" class="login-input" placeholder="كلمة المرور">
                <button class="login-btn" onclick="attemptLogin('manager')">دخول آمن</button>
            </div>
            <div id="login-admin" class="login-form">
                <input type="password" id="adminPass" class="login-input" placeholder="كلمة المرور">
                <button class="login-btn" onclick="attemptLogin('admin')">دخول آمن</button>
            </div>
            <p id="errorMsg">خطأ في كلمة المرور!</p>
        </div>
    </div>

    <!-- المحتوى -->
    <div id="dashboardWrapper">
        <aside class="sidebar" id="sidebar">
            <div class="brand"><h1>نادي آفاق</h1><span>eSports HQ</span></div>
            <nav class="nav-menu">
                <a class="nav-item active" onclick="showPage('page-home', this)"><i class="fa-solid fa-chart-pie"></i> الرئيسية</a>
                <a class="nav-item" onclick="showPage('page-tasks', this)"><i class="fa-solid fa-list-check"></i> المهام</a>
                <a class="nav-item" onclick="showPage('page-shared', this)"><i class="fa-solid fa-link"></i> الموارد</a>
                <a class="nav-item manager-only" onclick="showPage('page-manager', this)"><i class="fa-solid fa-briefcase"></i> إدارة النادي</a>
                <a class="nav-item admin-only" onclick="showPage('page-admin', this)" style="display:none;"><i class="fa-solid fa-file-signature"></i> النماذج</a>
            </nav>
            <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-info"><h2 id="welcomeText">مركز القيادة</h2></div>
                <div class="user-badge" id="userBadge"></div>
            </header>

            <!-- الصفحة 1 -->
            <div id="page-home" class="page-section active">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-num" id="countMembers">--</div><div>الأعضاء</div></div>
                    <div class="stat-card outline"><div class="stat-num" id="countAdmins">--</div><div>الإداريون</div></div>
                </div>
                <div class="embed-container"><iframe src="https://calendar.google.com/calendar/embed?src=23d87417ba91caca1cc0b90940e951b82a35f165e44e2dbf090e9963128ecf9c@group.calendar.google.com&ctz=Asia/Riyadh"></iframe></div>
            </div>

            <!-- الصفحة 2: المهام -->
            <div id="page-tasks" class="page-section">
                <div class="section-title"><h2>المهام النشطة</h2></div>
                <div id="cardsContainer" class="tasks-container"></div>
            </div>

            <!-- الصفحة 3: الموارد -->
            <div id="page-shared" class="page-section">
                <div class="grid-cards">
                    <a href="https://discord.gg/TbUBfFQsEy" class="action-card"><div class="icon-box"><i class="fa-brands fa-discord"></i></div><div>ديسكورد الفريق</div></a>
                    <a href="https://deecc.my.canva.site/eateam-link" class="action-card"><div class="icon-box"><i class="fa-solid fa-link"></i></div><div>الروابط والحسابات</div></a>
                    <a href="https://drive.google.com/drive/folders/1A3uxWu5okmDGMkejzSZlW6D9BU090_1E?usp=sharing" class="action-card"><div class="icon-box"><i class="fa-brands fa-google-drive"></i></div><div>درايف اللجنة</div></a>
                </div>
            </div>

            <!-- الصفحة 4: المدير -->
            <div id="page-manager" class="page-section manager-only">
                <div class="embed-container"><iframe src="https://calendar.google.com/calendar/u/0?cid=ZjdiY2E4N2IzYzljYzY1ZGQyOWYxNTkwMzhiNWJlYjI5NWQ5NzU2YmNkNTM5YTk1NTQ1YjQ5YzVmNGY5Zjc1NUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t"></iframe></div>
                <a href="https://docs.google.com/forms/d/19mKar458Uz2PcJWfd55wzMgiycOsuJaYRuRrEYyDsrQ/edit" class="action-card danger"><div class="icon-box"><i class="fa-solid fa-gavel"></i></div><div>نموذج مخالفات</div></a>
            </div>

            <!-- الصفحة 5: الإداري -->
            <div id="page-admin" class="page-section admin-only" style="display:none;">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSdPVe18ZGd4S2iyAciFjD7-I9GzHvxo9fslLQMjOez4HevNzQ/viewform?usp=publish-editor" class="action-card"><div>طلب ترقية</div></a>
                <a href="https://forms.gle/8eMxL5iM82NoHeFNA" class="action-card"><div>شكاوى واقتراحات</div></a>
            </div>
        </main>
    </div>

    <script>
        // ضع روابط الـ API الخاصة بك هنا
        const STATS_API = "https://script.google.com/macros/s/AKfycby7Wselw-5JOJQf5BqTBOBiC58H2d2A4WC0z7-H2UUddfaigfWPb00K2zT4f7UBySh1pQ/exec";
        const TASKS_API = "https://script.google.com/macros/s/AKfycbwwQmElZ1eaHbkL7xyV4_JZ5zR7KdDSgajIZQPkdrqrwnkMzZfcGAB3BROKJpdjrMjB/exec";

        function switchLoginTab(role) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('login-' + role).classList.add('active');
        }

        function attemptLogin(role) {
            const pass = document.getElementById(role + 'Pass').value;
            if((role === 'manager' && pass === 'adminafaq123') || (role === 'admin' && pass === 'afaqse123')) {
                currentRole = role;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardWrapper').style.display = 'flex';
                // تفعيل صلاحيات العرض
                if(role === 'admin') {
                    document.querySelectorAll('.manager-only').forEach(e => e.style.display = 'none');
                    document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'flex');
                }
                fetchStatistics();
                loadTasks();
            } else { alert("كلمة المرور خاطئة"); }
        }

        function showPage(pageId, btn) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }

        function fetchStatistics() {
            fetch(STATS_API).then(r => r.json()).then(data => {
                document.getElementById('countMembers').innerText = data.members;
                document.getElementById('countAdmins').innerText = data.admins;
            });
        }

        function loadTasks() {
            fetch(TASKS_API).then(r => r.json()).then(data => {
                const container = document.getElementById('cardsContainer');
                container.innerHTML = "";
                data.forEach(t => {
                    let card = document.createElement('div');
                    card.className = "task-card";
                    card.innerHTML = `<div><strong>المهمة:</strong> ${t.Task || 'بدون'}</div><div><strong>الأولوية:</strong> ${t.Priority || 'عادية'}</div>`;
                    if(currentRole === 'manager') {
                        let btn = document.createElement('button');
                        btn.className = "btn-delete";
                        btn.innerText = "أرشفة المهمة";
                        btn.onclick = () => {
                            fetch(TASKS_API + "?action=delete&taskName=" + encodeURIComponent(t.Task))
                            .then(() => card.remove());
                        };
                        card.appendChild(btn);
                    }
                    container.appendChild(card);
                });
            });
        }
        
        function logout() { location.reload(); }
    </script>
</body>
</html>
